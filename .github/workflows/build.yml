name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# softprops/action-gh-release@v2 needs to create / edit Release objects
# and attach binaries; default GITHUB_TOKEN scope is read-only since 2023.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest is Apple Silicon (arm64). Apple Silicon covers
          # >85% of active Mac users in 2026. We previously also built on
          # macos-13 for an x64 .dmg but that runner pool is heavily
          # contended on GitHub's free tier (jobs sit queued for 30-60+
          # minutes). Re-add the macos-13 row when there's actual Intel
          # Mac demand and we can afford the wait.
          - os: macos-latest
            target: mac
            artifact: 'desktop/dist/*-arm64.dmg'
            extra_arch_flag: '--arm64'
          - os: windows-latest
            target: win
            artifact: 'desktop/dist/*.exe'
            extra_arch_flag: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend deps
        working-directory: backend
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Build backend bundle (PyInstaller)
        working-directory: desktop
        run: npm run build:backend

      - name: Build renderer bundle (Vite)
        working-directory: desktop
        run: npx electron-vite build

      - name: Package (mac)
        if: matrix.target == 'mac'
        working-directory: desktop
        run: npx electron-builder --mac ${{ matrix.extra_arch_flag }}
        env:
          # Skip code signing — produces unsigned .dmg
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Package (win)
        if: matrix.target == 'win'
        working-directory: desktop
        run: npx electron-builder --win

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-installer
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
