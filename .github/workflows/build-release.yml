name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v0.2.3)'
        required: true
        default: 'v0.2.3'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.event.inputs.version }} --title "Version ${{ github.event.inputs.version }}" --notes "Automated release" || true

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run build:mac
            asset_path: "desktop/dist/*.dmg"
          - os: windows-latest
            build_cmd: npm run build:win
            asset_path: "desktop/dist/*.exe"
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.2'

      - name: Install Python Dependencies (Mac)
        if: runner.os == 'macOS'
        run: |
          cd backend
          python -m venv .venv
          source .venv/bin/activate
          pip install .
          pip install pyinstaller

      - name: Install Python Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          cd backend
          python -m venv .venv
          .venv\Scripts\activate
          pip install .
          pip install pyinstaller

      - name: Install Node Dependencies
        run: |
          cd desktop
          npm install

      - name: Build App
        run: |
          cd desktop
          ${{ matrix.build_cmd }}
          
      - name: Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.version }} ${{ matrix.asset_path }} --clobber
